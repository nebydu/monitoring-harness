# monitoring-harness 전용 Codex TUI footer 구성.
# Claude Code statusline과 최대한 비슷하게 모델, 컨텍스트, 사용 제한, 세션/브랜치를 표시한다.
[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "five-hour-limit",
  "weekly-limit",
  "git-branch",
  "session-id",
]

# 터미널 창/탭 제목에도 현재 작업 대상을 남긴다.
terminal_title = ["spinner", "project", "git-branch", "model"]
